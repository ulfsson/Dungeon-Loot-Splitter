<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Eik Ulfsson">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js"></script>
    <title>Dungeon Loot Splitter</title>
</head>

<body>
    <header>
        <h1>Dungeon Loot Splitter</h1>
    </header>

    <main>
        <section class="panel">
            <h2>Party Setup</h2>
            How many are in the party?<br>
            <br>
            <input type="number" value="1" min="1">
        </section>

        <section class="panel">
            <h2>Add Loot</h2>
            <label for="lootname">Name:</label><br>
            <input id="lootname" placeholder="Name of Object"><br>
            <br>
            <label for="lootvalue">Base Value:</label><br>
            <input id="lootvalue" type="number" min="0" step="0.01" value="0.00"><br>
            <br>
            Quality (aka Rarity; internal value adjustment):<br>
            <quality-picker aria-label="Loot quality picker." role="radiogroup">
                <label><input type="radio" name="lootquality" id="quality-poor">Poor</label>
                <label><input type="radio" name="lootquality" id="quality-common" checked>Common</label>
                <label><input type="radio" name="lootquality" id="quality-uncommon">Uncommon</label>
                <label><input type="radio" name="lootquality" id="quality-rare">Rare</label>
                <label><input type="radio" name="lootquality" id="quality-epic">Epic</label>
            </quality-picker>
            <br><br>
            <button>Add Loot</button>
        </section>

        <section class="panel">
            <h2>Loot List</h2>
            <table class="loot-list-table">
                <tr>
                    <th>
                        Item Name
                    </th>

                    <th>
                        Quality
                    </th>
                    
                    <th>
                        Base Value
                    </th>
                    
                    <th>
                        Quality Value
                    </th>
                </tr>

                <tr>
                    <td>
                        Round Pantaloons
                    </td>
                    <td>
                        Common
                    </td>
                    <td>
                        3.14
                    </td>
                    <td>
                        3.14
                    </td>
                </tr>
            </table>
        </section>

        <section class="panel">
            <h2>Split Loot</h2>
        </section>

        <hr>

        <section class="panel reflection">
            <h2>Logic Explanation</h2>
        </section>
    </main>
</body>

</html>
