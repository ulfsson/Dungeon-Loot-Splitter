<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Eik Ulfsson">
    <link rel="stylesheet" href="./css/style.css">
    <title>Dungeon Loot Splitter</title>
</head>

<body>
    <header>
        <h1>Dungeon Loot Splitter</h1>
    </header>

    <main>
        <section class="panel">
            <h2>Party Setup</h2>
            How many are in the party?<br>
            <br>
            <input type="number" id="partyNumber" value="1" min="1">
        </section>

        <section class="panel">
            <h2>Add Loot</h2>
            <form id="lootForm" name="lootForm">
                <label for="lootname">Name:</label><br>
                <input id="lootname" placeholder="Name of Item"><br>
                <br>
                <label for="lootvalue">Base Value:</label><br>
                <input id="lootvalue" type="number" min="0" step="0.01" value="3.14"><br>
                <br>
                Quality (aka Rarity; internal value adjustment):<br>
                <quality-picker aria-label="Loot quality picker." role="radiogroup">
                    <label><input type="radio" name="lootquality" id="quality-poor" value="0">Poor</label>
                    <label><input type="radio" name="lootquality" id="quality-common" value="1" checked>Common</label>
                    <label><input type="radio" name="lootquality" id="quality-uncommon" value="2">Uncommon</label>
                    <label><input type="radio" name="lootquality" id="quality-rare" value="3">Rare</label>
                    <label><input type="radio" name="lootquality" id="quality-epic" value="4">Epic</label>
                </quality-picker>
                <br><br>
            </form>
            <button id="addLootButton" value="addLoot">Add Loot</button>
        </section>

        <section class="panel">
            <h2>Loot List</h2>
            <table class="loot-list-table" id="lootTable">
            </table>
        </section>

        <section class="panel">
            <h2>Split Loot</h2>
            <button id="splitLootButton">Split Loot</button>
            <table id="lootSplitTable">
            </table>
        </section>

        <hr>

        <section class="panel reflection">
            <h2>Logic Explanation</h2>
            <button id="debugRandomLoot">Debug Random Loot</button>
        </section>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
